name: Test Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '22'

      - name: Grant execute permission
        working-directory: gradleproject
        run: chmod +x gradlew

      - name: Prepare Allure results
        run: |
          rm -rf gradleproject/target/allure-results gradleproject/build/allure-results allure-report

      - name: Run tests
        working-directory: gradleproject
        run: ./gradlew clean test --tests "com.example.Selenium.data.OrdersDataIT"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: gradleproject/target/allure-results
          if-no-files-found: warn

      - name: Fetch previous Allure history
        if: always()
        continue-on-error: true
        run: |
          mkdir -p allure-history
          cd allure-history
          git clone --depth 1 --branch gh-pages --single-branch https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          cd ..

      - name: Generate and publish Allure report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: gradleproject/target/allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages

      - name: Report link
        if: always()
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          REPORT_URL="https://${OWNER}.github.io/${REPO_NAME}/"
          echo "✅ Allure report generated"
          echo "📊 Report: ${REPORT_URL}"
          echo "📊 Report: [Open Allure report](${REPORT_URL})" >> "$GITHUB_STEP_SUMMARY"
 