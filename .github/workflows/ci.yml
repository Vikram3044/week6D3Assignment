name: Test Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '22'

      - name: Grant execute permission
        working-directory: gradleproject
        run: chmod +x gradlew

      - name: Prepare Allure results
        run: |
          rm -rf gradleproject/build/allure-results allure-report

      - name: Run tests
        working-directory: gradleproject
        run: ./gradlew clean test --tests "com.example.Selenium.data.W6D3TestDataBuilderStructureTest" --tests "com.example.Selenium.data.W6D4ReportingInsightsTest"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: gradleproject/build/allure-results
          if-no-files-found: warn

      - name: Fetch previous Allure history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate and publish Allure report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: gradleproject/build/allure-results
          allure_report: allure-report
          allure_history: allure-history
          gh_pages: gh-pages

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: allure-history
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Report link
        if: always()
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          REPORT_URL="https://${OWNER}.github.io/${REPO_NAME}/"
          echo "✅ Allure report generated"
          echo "📊 Report: ${REPORT_URL}"
          echo "📊 Report: [Open Allure report](${REPORT_URL})" >> "$GITHUB_STEP_SUMMARY"
 